# Official tutorial 
# MkDocs: https://www.mkdocs.org/user-guide/configuration/
# MkDocs-Material: https://squidfunk.github.io/mkdocs-material/

site_name: 'KFACBT 的博客'
site_description: 'Anyway, keep learning.'
# site_url: http://www.example.com/

#  GitHub Repo link
repo_url: https://github.com/gytxtx/Blog/

theme:
  name: material

  # 设置站点图标
  logo: assets/logo.jpg
  favicon: assets/favicon.ico
  # favicon: attachment/portrait.png

  language: zh # 中文，解决中文搜索问题
  features:
    - navigation.expand 
    - tabs 

  # 自定义覆盖默认行为文件夹
  custom_dir: overrides

  # 提供切换 日间 / 夜间 模式的选项
  palette: 

    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# 自定义导航栏
nav:
  - 博客:
      - blog/index.md
      - 关于: blog/About.md
      - 标签: blog/tags.md

markdown_extensions: 
  - attr_list # https://squidfunk.github.io/mkdocs-material/reference/images/

  # 文档内嵌图标支持
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  - pymdownx.tabbed  # https://squidfunk.github.io/mkdocs-material/reference/content-tabs/
  - nl2br # newline-to-break 
  - toc:
      permalink: '#' # heading anchor 
      slugify: !!python/name:pymdownx.slugs.uslugify # 解决中文标题解析问题
  - admonition
  - codehilite:
      guess_lang: false
      linenums: false
  - footnotes
  - meta
  - def_list
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  # - pymdownx.emoji:
      # emoji_generator: !!python/name:pymdownx.emoji.to_png
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.tilde
plugins:
  - search
  - roamlinks 
  - blog # 博客插件
  - tags: # 与博客集成的标签插件
      tags_file: blog/tags.md # 标签索引文件
    #- autolinks 
  - exclude:
      glob:
        - "*.tmp"
        - "*.pdf"
        - "*.gz"
      regex:
        - '.*\.(tmp|bin|tar)$'
